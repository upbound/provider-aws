apiVersion: ds.aws.upbound.io/v1beta1
kind: LogSubscription
metadata:
  annotations:
    uptest.upbound.io/timeout: "3600" # one hour timeout
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    directoryIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    logGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    region: us-east-1

---

apiVersion: cloudwatchlogs.aws.upbound.io/v1beta1
kind: Group
metadata:
  annotations:
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    region: us-east-1
    retentionInDays: 14

---

apiVersion: cloudwatchlogs.aws.upbound.io/v1beta1
kind: ResourcePolicy
metadata:
  annotations:
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: ad-log-policy
  name: ad-log-policy
spec:
  forProvider:
    policyDocument: |
      {
         "Version": "2012-10-17",
         "Statement": [
           {
             "Action": [
                  "logs:CreateLogStream",
                  "logs:PutLogEvents"
              ],
              "Resource": "*",
              "Effect": "Allow",
              "Principal": {
                  "Service": ["ds.amazonaws.com"]
              }
           }
         ]
      }
    region: us-east-1

---

apiVersion: ds.aws.upbound.io/v1beta1
kind: Directory
metadata:
  annotations:
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    name: corp.notexample.com
    passwordSecretRef:
      key: example-key
      name: example-secret
      namespace: upbound-system
    region: us-east-1
    size: Small
    tags:
      Project: foo
    type: MicrosoftAD
    vpcSettings:
      - subnetIdsRefs:
          - name: foo
          - name: bar
        vpcIdSelector:
          matchLabels:
            testing.upbound.io/example-name: main

---

apiVersion: ec2.aws.upbound.io/v1beta1
kind: Subnet
metadata:
  annotations:
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: bar
  name: bar
spec:
  forProvider:
    availabilityZone: us-east-1b
    cidrBlock: 10.0.2.0/24
    region: us-east-1
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main

---

apiVersion: ec2.aws.upbound.io/v1beta1
kind: Subnet
metadata:
  annotations:
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: foo
  name: foo
spec:
  forProvider:
    availabilityZone: us-east-1a
    cidrBlock: 10.0.1.0/24
    region: us-east-1
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main

---

apiVersion: ec2.aws.upbound.io/v1beta1
kind: VPC
metadata:
  annotations:
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: main
  name: main
spec:
  forProvider:
    cidrBlock: 10.0.0.0/16
    region: us-east-1

---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    meta.upbound.io/example-id: ds/v1beta1/logsubscription
  labels:
    testing.upbound.io/example-name: secret-version
  name: example-secret
  namespace: upbound-system
type: Opaque
stringData:
  example-key: "P@ssw0rd"